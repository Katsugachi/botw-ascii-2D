<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyrule ASCII Atlas</title>
<style>

  :root {
    --void: #060d0f;
    --void-soft: #0a1518;
    --panel: #0d1b1e;
    --panel-edge: rgba(95, 242, 224, 0.22);
    --cyan: #5ff2e0;
    --cyan-dim: #2f6864;
    --cyan-glow: rgba(95, 242, 224, 0.45);
    --amber: #f2a765;
    --ink: #eaf8f6;
    --ink-muted: #7c9fa0;
    --danger: #ff6b5e;

    --font-display: "Century Gothic", "Avantgarde", "Segoe UI", "Trebuchet MS", sans-serif;
    --font-body: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --font-mono: "Consolas", "Cascadia Mono", "Courier New", monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--void);
    color: var(--ink);
    font-family: var(--font-body);
    overflow: hidden;
  }

  ::selection { background: var(--cyan-dim); color: var(--ink); }

  :focus-visible {
    outline: 2px solid var(--cyan);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  #app { display: flex; flex-direction: column; width: 100vw; height: 100vh; }

  /* ---------------- Top HUD bar ---------------- */
  #topbar {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 20px;
    height: 58px;
    flex: 0 0 auto;
    background: linear-gradient(180deg, var(--panel) 0%, var(--void-soft) 100%);
    border-bottom: 1px solid var(--panel-edge);
    z-index: 30;
  }

  #brand { display: flex; align-items: center; gap: 10px; }

  #brandMark {
    width: 26px; height: 26px;
    flex: 0 0 auto;
  }
  #brandMark polygon { fill: none; stroke: var(--cyan); stroke-width: 4; }
  #brandMark circle { fill: var(--cyan); }

  #brandText { display: flex; flex-direction: column; line-height: 1.1; }
  #brandTitle {
    font-family: var(--font-display);
    font-size: 15px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--ink);
  }
  #brandSub {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--cyan-dim);
    margin-top: 2px;
  }

  #divider {
    width: 1px; height: 30px;
    background: var(--panel-edge);
  }

  #hudControls { display: flex; align-items: center; gap: 10px; flex: 1; }
  #spacer { flex: 1; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--cyan-dim);
    border-radius: 3px;
    padding: 7px 13px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .btn svg { width: 14px; height: 14px; flex: 0 0 auto; }
  .btn:hover { border-color: var(--cyan); background: rgba(95,242,224,0.08); }
  .btn:active { background: rgba(95,242,224,0.15); }
  .btn.primary {
    background: var(--cyan);
    border-color: var(--cyan);
    color: var(--void);
  }
  .btn.primary:hover { background: #7ff7e8; }
  .btn.icon-only { padding: 7px 9px; }

  select#colorMode {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--ink);
    background: var(--void-soft);
    border: 1px solid var(--cyan-dim);
    border-radius: 3px;
    padding: 7px 10px;
    cursor: pointer;
  }
  select#colorMode:hover { border-color: var(--cyan); }

  #fileInput { display: none; }

  /* ---------------- Settings popover ---------------- */
  #settingsPopover {
    position: absolute;
    top: 64px;
    right: 20px;
    width: 240px;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 6px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.55);
    padding: 16px;
    z-index: 40;
    display: none;
  }
  #settingsPopover.open { display: block; }
  #settingsPopover h3 {
    margin: 0 0 12px 0;
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cyan);
  }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--ink-muted);
    margin-bottom: 6px;
  }
  .field label span.val { color: var(--cyan); font-family: var(--font-mono); }
  input[type="range"] {
    width: 100%;
    accent-color: var(--cyan);
    background: transparent;
  }
  .toggleRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 12px;
    color: var(--ink-muted);
    cursor: pointer;
    user-select: none;
  }
  .toggleRow input[type="checkbox"] {
    width: 34px;
    height: 18px;
    appearance: none;
    -webkit-appearance: none;
    position: relative;
    flex: 0 0 auto;
    border: 1px solid var(--cyan-dim);
    border-radius: 999px;
    background: rgba(0,0,0,0.25);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .toggleRow input[type="checkbox"]::before {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    left: 2px;
    top: 2px;
    border-radius: 50%;
    background: var(--ink-muted);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .toggleRow input[type="checkbox"]:checked {
    border-color: var(--cyan);
    background: rgba(95,242,224,0.16);
  }
  .toggleRow input[type="checkbox"]:checked::before {
    transform: translateX(16px);
    background: var(--cyan);
  }

  /* ---------------- Main viewport ---------------- */
  #viewportWrap {
    position: relative;
    flex: 1;
    min-height: 0;
    background: var(--void);
    margin: 12px;
    border-radius: 4px;
    overflow: hidden;
  }

  #canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
    background: var(--void);
  }
  #canvas.dragging { cursor: grabbing; }

  /* ---------------- Corner scan-frame (signature motif) ---------------- */
  .scan-frame { position: absolute; inset: 0; pointer-events: none; z-index: 12; }
  .corner {
    position: absolute;
    width: 26px; height: 26px;
    border-color: var(--cyan);
    opacity: 0.75;
    filter: drop-shadow(0 0 3px var(--cyan-glow));
  }
  .corner.tl { top: 10px; left: 10px; border-top: 2px solid; border-left: 2px solid; }
  .corner.tr { top: 10px; right: 10px; border-top: 2px solid; border-right: 2px solid; }
  .corner.bl { bottom: 10px; left: 10px; border-bottom: 2px solid; border-left: 2px solid; }
  .corner.br { bottom: 10px; right: 10px; border-bottom: 2px solid; border-right: 2px solid; }

  /* ---------------- Drop zone ---------------- */
  #dropZone {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, var(--void-soft) 0%, var(--void) 75%);
    z-index: 20;
  }
  #dropZone.hidden { display: none; }
  #dropZone.dragover #dropCard { border-color: var(--cyan); background: rgba(95,242,224,0.06); }

  #dropCard {
    position: relative;
    text-align: center;
    padding: 46px 56px;
    border: 1px solid var(--panel-edge);
    border-radius: 6px;
    max-width: 440px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  #dropCard svg.hex-icon { width: 46px; height: 46px; margin-bottom: 14px; }
  #dropCard .hex-icon polygon { fill: none; stroke: var(--cyan-dim); stroke-width: 2.5; }
  #dropCard h2 {
    font-family: var(--font-display);
    font-size: 17px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 10px 0;
  }
  #dropCard p {
    color: var(--ink-muted);
    font-size: 13.5px;
    line-height: 1.6;
    margin: 0 0 22px 0;
  }
  #dropCard code {
    background: rgba(0,0,0,0.35);
    color: var(--cyan);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 12.5px;
  }

  /* ---------------- Readout panel (bottom-left) ---------------- */
  #infoPanel {
    position: absolute;
    bottom: 16px; left: 16px;
    background: rgba(13,27,30,0.88);
    border: 1px solid var(--panel-edge);
    border-left: 2px solid var(--cyan);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--ink-muted);
    pointer-events: none;
    z-index: 15;
    max-width: 260px;
  }
  #infoPanel.hidden { display: none; }
  #infoPanel .name {
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--ink);
    display: block;
    margin-bottom: 4px;
  }
  #infoPanel .num { color: var(--cyan); font-family: var(--font-mono); }
  #infoPanel .lod {
    display: inline-block;
    margin-top: 4px;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--amber);
  }

  /* ---------------- Minimap (square radar) ---------------- */
  #minimapWrap {
    position: absolute;
    bottom: 16px; right: 16px;
    width: 168px; height: 168px;
    z-index: 15;
  }
  #minimapWrap.hidden { display: none; }
  #minimap {
    width: 100%; height: 100%;
    clip-path: none;
    background: #000;
    border: 1px solid var(--cyan-dim);
    box-shadow: inset 0 0 0 1px rgba(95, 242, 224, 0.18), 0 0 18px rgba(0,0,0,0.45);
    cursor: crosshair;
  }
  #minimapWrap .ring {
    position: absolute; inset: -5px;
    clip-path: none;
    border: 1px solid var(--panel-edge);
    border-radius: 2px;
    pointer-events: none;
    z-index: -1;
  }

  /* ---------------- Help hint ---------------- */
  #helpHint {
    position: absolute;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--ink-muted);
    background: rgba(13,27,30,0.82);
    border: 1px solid var(--panel-edge);
    padding: 7px 14px;
    border-radius: 4px;
    z-index: 15;
    white-space: nowrap;
  }
  #helpHint.hidden { display: none; }

  /* ---------------- Loading overlay ---------------- */
  #loadingOverlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(6,13,15,0.92);
    z-index: 50;
    gap: 14px;
  }
  #loadingOverlay.hidden { display: none; }
  #loadingText {
    font-family: var(--font-display);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink);
    font-size: 13px;
  }
  #loadingBarTrack {
    width: 260px; height: 3px;
    background: rgba(95,242,224,0.15);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  #loadingBarFill {
    height: 100%; width: 0%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan-glow);
    transition: width 0.1s ease;
  }

  /* ---------------- Toast / error banner ---------------- */
  #banner {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--danger);
    color: var(--ink);
    padding: 9px 16px;
    border-radius: 4px;
    font-size: 12.5px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    z-index: 60;
    max-width: 70vw;
  }
  #banner.hidden { display: none; }
  #banner.info { border-color: var(--cyan); }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div id="brand">
      <svg id="brandMark" viewBox="0 0 24 24">
        <polygon points="12,2 21,7 21,17 12,22 3,17 3,7"></polygon>
        <circle cx="12" cy="12" r="2.6"></circle>
      </svg>
      <div id="brandText">
        <div id="brandTitle">Hyrule ASCII Atlas</div>
        <div id="brandSub">Map tile viewer</div>
      </div>
    </div>

    <div id="divider"></div>

    <div id="hudControls">
      <button class="btn primary" id="btnLoad">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        Reload map
      </button>
      <input type="file" id="fileInput" accept=".txt,text/plain">

      <select id="colorMode">
        <option value="ivory">Ivory Ink</option>
        <option value="terminal">Terminal Cyan</option>
        <option value="parchment">Parchment</option>
        <option value="heatmap">Canopy Heatmap</option>
      </select>

      <button class="btn" id="btnReset">Fit to screen</button>
    </div>

    <button class="btn icon-only" id="btnSettings" title="View settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>

  <div id="settingsPopover">
    <h3>View settings</h3>
    <div class="field">
      <label>Zoom <span class="val" id="zoomVal">1.0x</span></label>
      <input type="range" id="zoomSlider" min="0" max="1000" value="0" step="1">
    </div>
    <div class="field">
      <label>Vertical stretch <span class="val" id="aspectVal">100%</span></label>
      <input type="range" id="aspectSlider" min="50" max="200" value="100" step="1">
    </div>
    <div class="field">
      <label class="toggleRow" for="reliefToggle">
        <span>2.5D heightfield</span>
        <input type="checkbox" id="reliefToggle">
      </label>
    </div>
  </div>

  <div id="viewportWrap">
    <canvas id="canvas"></canvas>

    <div class="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>

    <div id="infoPanel" class="hidden"></div>

    <div id="helpHint" class="hidden">Drag to pan &middot; Scroll to zoom &middot; Arrows to pan &middot; 0 to reset</div>

    <div id="minimapWrap" class="hidden">
      <div class="ring"></div>
      <canvas id="minimap" width="168" height="168"></canvas>
    </div>

    <div id="banner" class="hidden"></div>

    <div id="dropZone">
      <div id="dropCard">
        <svg class="hex-icon" viewBox="0 0 24 24">
          <polygon points="12,2 21,7 21,17 12,22 3,17 3,7"></polygon>
        </svg>
        <h2>Loading ASCII map</h2>
        <p>This viewer automatically loads <code>finished file/BOTW-ASCII.txt</code> from beside this HTML file.</p>
        <button class="btn primary" id="btnLoadCenter">Reload map</button>
      </div>
    </div>

    <div id="loadingOverlay" class="hidden">
      <div id="loadingText">Scanning map&hellip;</div>
      <div id="loadingBarTrack"><div id="loadingBarFill"></div></div>
    </div>
  </div>

</div>

<script>
(function () {
  "use strict";

  // ===================================================================
  // Constants
  // ===================================================================

  // Must stay in sync with RAMP_DETAILED in stitchandasciify.py. Used to
  // derive a rough "ink density" per character for the heatmap style and
  // the level-of-detail overview bitmap -- doesn't need to be a perfect
  // match for an arbitrary custom charset, just a sane default.
  const DENSITY_REFERENCE_RAMP =
    " .'`^\",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$";

  // The map text file is loaded automatically from beside this HTML file.
  // Example hosted layout:
  //   /Hyrule Atlas.html
  //   /finished file/BOTW-ASCII.txt
  // The space is URL-encoded so every browser/server handles it cleanly.
  const DEFAULT_MAP_URL = "finished%20file/BOTW-ASCII.txt";

  const MIN_CELL_SIZE = 0.1;
  const MAX_CELL_SIZE = 42;
  const ZOOM_SLIDER_STEPS = 1000;

  // Below this many CSS pixels per character, individual glyphs are no
  // longer legible -- render the precomputed overview bitmap instead of
  // real text. This is the fix for the "1 fps at large zoom-out" problem:
  // it caps per-frame rendering work to a single drawImage call no matter
  // how far zoomed out the view is, instead of shaping tens of thousands
  // of characters across hundreds of fillText calls every frame.
  // LOD blending band.  Instead of abruptly replacing the overview with
  // glyphs at one magic zoom level, the viewer crossfades from the overview
  // scan into real text across this range.  That makes zoom-in feel continuous
  // and prevents the "random popping" look when glyphs first become readable.
  const TEXT_FADE_START_PX = 1.0;
  const TEXT_FADE_END_PX = 3.2;

  // Pseudo-3D relief built from the overview's light/dark density map.
  // Dense/bright regions are treated as high ground, sparse/dark regions as
  // low ground.  The result is a 2.5D heightfield backdrop under the ASCII.
  const RELIEF_HEIGHT_PX = 26;
  const RELIEF_SIDE_SHIFT_PX = 8;
  const RELIEF_SLOPE_STRENGTH = 5.5;
  const RELIEF_HEIGHT_POWER = 1.15;
  const RELIEF_SHADOW_ALPHA = 0.24;

  // Important: the source overview contains bright, thin roads. Those should
  // stay painted on the map, but they should NOT become raised walls. Keep the
  // original high-detail heightfield, then only flatten pixels that look like
  // narrow bright roads/paths against their surrounding terrain.
  const RELIEF_ROAD_BG_RADIUS = 10;
  const RELIEF_ROAD_LOCAL_RADIUS = 2;
  const RELIEF_ROAD_MIN_DENSITY = 0.38;
  const RELIEF_ROAD_CONTRAST = 0.105;
  const RELIEF_ROAD_THINNESS = 0.075;
  const RELIEF_ROAD_HEIGHT_PAD = 0.015;

  const OVERVIEW_RES = 1536;     // resolution (both axes) of the LOD bitmap
  const MINIMAP_DISPLAY_SIZE = 168;
  const HEATMAP_BUCKETS = 20;    // quantization for run-batched heatmap text
  const LARGE_FILE_WARN_BYTES = 60 * 1024 * 1024; // 60 MB
  const FONT_CALIBRATION_SAMPLE_LEN = 64;
  const FONT_CALIBRATION_REF_SIZE = 200;

  const COLOR_MODES = {
    ivory: { bg: "#0b1517", fg: "#eaf8f6", label: "Ivory Ink" },
    terminal: { bg: "#03100e", fg: "#5ff2e0", label: "Terminal Cyan" },
    parchment: { bg: "#efe6cf", fg: "#3a2d1c", label: "Parchment" },
    heatmap: {
      bg: "#0b1517",
      // Sparse -> dense gradient stops used for both the heatmap text style
      // and (recolored per-mode) the LOD overview bitmap.
      gradient: ["#0b1517", "#123b3a", "#2f6864", "#5ff2e0", "#eaf8f6"],
      label: "Canopy Heatmap"
    }
  };

  // ===================================================================
  // DOM references
  // ===================================================================

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const minimapCanvas = document.getElementById("minimap");
  const minimapCtx = minimapCanvas.getContext("2d");

  const dropZone = document.getElementById("dropZone");
  const fileInput = document.getElementById("fileInput");
  const btnLoad = document.getElementById("btnLoad");
  const btnLoadCenter = document.getElementById("btnLoadCenter");
  const btnReset = document.getElementById("btnReset");
  const btnSettings = document.getElementById("btnSettings");
  const settingsPopover = document.getElementById("settingsPopover");
  const zoomSlider = document.getElementById("zoomSlider");
  const zoomVal = document.getElementById("zoomVal");
  const aspectSlider = document.getElementById("aspectSlider");
  const aspectVal = document.getElementById("aspectVal");
  const reliefToggle = document.getElementById("reliefToggle");
  const colorModeSelect = document.getElementById("colorMode");
  const infoPanel = document.getElementById("infoPanel");
  const minimapWrap = document.getElementById("minimapWrap");
  const helpHint = document.getElementById("helpHint");
  const banner = document.getElementById("banner");
  const loadingOverlay = document.getElementById("loadingOverlay");
  const loadingText = document.getElementById("loadingText");
  const loadingBarFill = document.getElementById("loadingBarFill");

  // ===================================================================
  // Application state
  // ===================================================================
  const state = {
    lines: null,
    rows: 0,
    cols: 0,
    fileName: "",
    fileSizeBytes: 0,

    cellWidth: 10,
    aspectRatio: 1.0,       // cellHeight = cellWidth * aspectRatio. 1.0 = square
                            // cells, which is correct: each ASCII sample
                            // represents a square pixel region of the source
                            // tile. Anything else is a deliberate stylistic
                            // stretch, not a "correction".
    offsetX: 0,
    offsetY: 0,

    colorMode: "ivory",
    reliefEnabled: false,
    calibratedFont: "10px monospace",
    calibratedForWidth: -1,

    densityBuffer: null,     // Float32Array(OVERVIEW_RES*OVERVIEW_RES), raw density
    overviewCanvas: null,    // offscreen canvas holding the current color-mode bitmap
    reliefCanvas: null,      // offscreen canvas holding pseudo-3D heightfield relief
    densityLookup: null,     // Map<charCode, 0..1>
    bucketLookup: null,      // Map<charCode, 0..HEATMAP_BUCKETS-1>

    isDragging: false,
    dragStartClientX: 0,
    dragStartClientY: 0,
    dragStartOffsetX: 0,
    dragStartOffsetY: 0,

    dirty: true,
    rafPending: false,

    lastLodMode: null, // "text" | "bitmap", for the debug readout only
  };

  // ===================================================================
  // Utilities
  // ===================================================================

  function clamp(value, lo, hi) { return Math.min(hi, Math.max(lo, value)); }

  function smoothstep(edge0, edge1, value) {
    const t = clamp((value - edge0) / (edge1 - edge0), 0, 1);
    return t * t * (3 - 2 * t);
  }

  function showBanner(message, isError) {
    banner.textContent = message;
    banner.classList.toggle("info", !isError);
    banner.classList.remove("hidden");
    window.clearTimeout(showBanner._t);
    showBanner._t = window.setTimeout(() => banner.classList.add("hidden"), 5000);
  }

  function markDirty() {
    state.dirty = true;
    if (!state.rafPending) {
      state.rafPending = true;
      requestAnimationFrame(renderFrame);
    }
  }

  // ===================================================================
  // Density lookup (heatmap coloring + LOD overview bitmap)
  // ===================================================================

  function buildDensityLookup() {
    const lookup = new Map();
    const bucket = new Map();
    const rampLen = DENSITY_REFERENCE_RAMP.length;
    for (let i = 0; i < rampLen; i++) {
      const code = DENSITY_REFERENCE_RAMP.charCodeAt(i);
      if (!lookup.has(code)) {
        const density = i / (rampLen - 1);
        lookup.set(code, density);
        bucket.set(code, Math.min(HEATMAP_BUCKETS - 1, Math.floor(density * HEATMAP_BUCKETS)));
      }
    }
    state.densityLookup = lookup;
    state.bucketLookup = bucket;
  }

  function densityOf(charCode) {
    if (charCode === 32) return 0;
    const known = state.densityLookup.get(charCode);
    return known === undefined ? 0.5 : known;
  }

  function bucketOf(charCode) {
    if (charCode === 32) return 0;
    const known = state.bucketLookup.get(charCode);
    return known === undefined ? Math.floor(HEATMAP_BUCKETS / 2) : known;
  }

  function colorForDensity(density, mode) {
    if (mode === "heatmap") {
      return lerpGradient(COLOR_MODES.heatmap.gradient, density);
    }
    // Flat styles: fade from background toward the style's ink color as
    // density increases, used only for the LOD overview bitmap (real text
    // rendering just draws the actual glyphs in the flat ink color).
    return lerpColor(COLOR_MODES[mode].bg, COLOR_MODES[mode].fg, clamp(density, 0, 1));
  }

  function lerpGradient(stops, density) {
    const scaled = clamp(density, 0, 1) * (stops.length - 1);
    const i = Math.floor(scaled);
    const t = scaled - i;
    if (i >= stops.length - 1) return stops[stops.length - 1];
    return lerpColor(stops[i], stops[i + 1], t);
  }

  function lerpColor(hexA, hexB, t) {
    const a = hexToRgb(hexA), b = hexToRgb(hexB);
    const r = Math.round(a.r + (b.r - a.r) * t);
    const g = Math.round(a.g + (b.g - a.g) * t);
    const bl = Math.round(a.b + (b.b - a.b) * t);
    return `rgb(${r},${g},${bl})`;
  }

  function hexToRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }

  // ===================================================================
  // File loading + parsing
  // ===================================================================

  function loadDefaultMap() {
    loadingOverlay.classList.remove("hidden");
    loadingText.textContent = "Loading finished file/BOTW-ASCII.txt\u2026";
    loadingBarFill.style.width = "5%";

    fetch(DEFAULT_MAP_URL, { cache: "no-store" })
      .then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ${response.statusText}`.trim());
        }
        const contentLength = Number(response.headers.get("content-length")) || 0;
        loadingBarFill.style.width = "35%";
        return response.text().then((text) => ({ text, contentLength }));
      })
      .then(({ text, contentLength }) => {
        loadingBarFill.style.width = "65%";
        const sizeBytes = contentLength || new Blob([text]).size;
        parseAsciiText(text, DEFAULT_MAP_URL, sizeBytes);
      })
      .catch((err) => {
        loadingOverlay.classList.add("hidden");
        dropZone.classList.remove("hidden");
        showBanner(
          `Could not automatically load finished file/BOTW-ASCII.txt. Make sure the "finished file" folder is beside this HTML file and served over HTTP/HTTPS. ${err.message}`,
          true
        );
        console.error(err);
      });
  }

  function loadFile(file) {
    if (!file) return;
    if (file.size === 0) { showBanner("That file is empty.", true); return; }
    if (file.size > LARGE_FILE_WARN_BYTES) {
      const mb = (file.size / (1024 * 1024)).toFixed(0);
      if (!window.confirm(`This file is ${mb} MB, which may take a while and use a lot of memory. Continue?`)) return;
    }

    loadingOverlay.classList.remove("hidden");
    loadingText.textContent = "Scanning map\u2026";
    loadingBarFill.style.width = "0%";

    const reader = new FileReader();
    reader.onerror = () => {
      loadingOverlay.classList.add("hidden");
      showBanner("Could not read that file.", true);
    };
    reader.onload = () => {
      try {
        parseAsciiText(reader.result, file.name, file.size);
      } catch (err) {
        loadingOverlay.classList.add("hidden");
        showBanner("Failed to parse the file: " + err.message, true);
        console.error(err);
      }
    };
    reader.readAsText(file);
  }

  function parseAsciiText(text, fileName, fileSizeBytes) {
    let lines = text.split(/\r\n|\r|\n/);
    if (lines.length > 0 && lines[lines.length - 1] === "") lines.pop();
    if (lines.length === 0) throw new Error("no lines found in file");

    let maxLen = 0;
    for (let i = 0; i < lines.length; i++) if (lines[i].length > maxLen) maxLen = lines[i].length;
    if (maxLen === 0) throw new Error("file contains only blank lines");

    let raggedCount = 0;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].length < maxLen) {
        raggedCount++;
        lines[i] = lines[i] + " ".repeat(maxLen - lines[i].length);
      }
    }

    state.lines = lines;
    state.rows = lines.length;
    state.cols = maxLen;
    state.fileName = fileName;
    state.fileSizeBytes = fileSizeBytes;

    if (raggedCount > 0) {
      showBanner(`Note: ${raggedCount} row(s) were shorter than the rest and were padded with spaces.`, false);
    }

    buildDensityLookup();
    buildOverviewBufferAsync(() => {
      recolorOverviewBitmap();
      loadingOverlay.classList.add("hidden");
      dropZone.classList.add("hidden");
      infoPanel.classList.remove("hidden");
      helpHint.classList.remove("hidden");
      minimapWrap.classList.remove("hidden");
      fitToScreen();
    });
  }

  // ===================================================================
  // LOD overview bitmap
  // ===================================================================
  // Built once per file load (chunked across animation frames so a huge
  // map doesn't freeze the tab), independent of color mode. Recoloring on
  // a style change is then a cheap fixed-size pass over OVERVIEW_RES^2
  // pixels, not a rescan of the whole multi-million-character grid.

  function buildOverviewBufferAsync(onDone) {
    const buffer = new Float32Array(OVERVIEW_RES * OVERVIEW_RES);
    const counts = new Int32Array(OVERVIEW_RES * OVERVIEW_RES);

    const rows = state.rows, cols = state.cols;
    let row = 0;
    const rowsPerChunk = Math.max(1, Math.floor(rows / 40));

    function processChunk() {
      const end = Math.min(rows, row + rowsPerChunk);
      for (; row < end; row++) {
        const line = state.lines[row];
        const by = Math.min(OVERVIEW_RES - 1, Math.floor((row / rows) * OVERVIEW_RES));
        for (let col = 0; col < cols; col++) {
          const bx = Math.min(OVERVIEW_RES - 1, Math.floor((col / cols) * OVERVIEW_RES));
          const idx = by * OVERVIEW_RES + bx;
          buffer[idx] += densityOf(line.charCodeAt(col));
          counts[idx] += 1;
        }
      }
      loadingText.textContent = "Building overview\u2026";
      loadingBarFill.style.width = Math.round((row / rows) * 100) + "%";

      if (row < rows) {
        requestAnimationFrame(processChunk);
      } else {
        for (let i = 0; i < buffer.length; i++) buffer[i] = counts[i] > 0 ? buffer[i] / counts[i] : 0;
        state.densityBuffer = buffer;
        if (!state.overviewCanvas) {
          state.overviewCanvas = document.createElement("canvas");
          state.overviewCanvas.width = OVERVIEW_RES;
          state.overviewCanvas.height = OVERVIEW_RES;
        }
        onDone();
      }
    }
    processChunk();
  }

  function recolorOverviewBitmap() {
    if (!state.densityBuffer) return;
    const octx = state.overviewCanvas.getContext("2d");
    const imgData = octx.createImageData(OVERVIEW_RES, OVERVIEW_RES);
    const mode = state.colorMode;
    for (let i = 0; i < state.densityBuffer.length; i++) {
      const c = hexToRgbFromColorString(colorForDensity(state.densityBuffer[i], mode));
      imgData.data[i * 4 + 0] = c.r;
      imgData.data[i * 4 + 1] = c.g;
      imgData.data[i * 4 + 2] = c.b;
      imgData.data[i * 4 + 3] = 255;
    }
    octx.putImageData(imgData, 0, 0);

    // Heightfield is off by default, so do not spend time rebuilding its
    // heavier 2.5D bitmap unless the user has actually enabled it.
    if (state.reliefEnabled) buildReliefOverviewBitmap();
    else state.reliefCanvas = null;
  }

  function hexToRgbFromColorString(rgbString) {
    const m = /rgb\((\d+),(\d+),(\d+)\)/.exec(rgbString);
    return { r: +m[1], g: +m[2], b: +m[3] };
  }

  function buildRoadSuppressedHeightBuffer(source, width, height) {
    // Two cheap box blurs give us context without destroying the actual relief:
    // - broad background = where the surrounding terrain surface probably is
    // - tiny local mean = whether a bright pixel is a broad bright region or a
    //   skinny line sitting on darker terrain.
    const broadBg = new Float32Array(width * height);
    const localMean = new Float32Array(width * height);
    boxBlur(source, broadBg, width, height, RELIEF_ROAD_BG_RADIUS);
    boxBlur(source, localMean, width, height, RELIEF_ROAD_LOCAL_RADIUS);

    const out = new Float32Array(width * height);
    for (let i = 0; i < source.length; i++) {
      const d = source[i];
      const bg = broadBg[i];
      const local = localMean[i];

      // Road-like = bright enough, noticeably brighter than nearby terrain,
      // but not part of a broad bright mass. This catches thin pale road lines
      // while leaving snowy mountains / light plateaus raised like before.
      const isNarrowBrightLine =
        d >= RELIEF_ROAD_MIN_DENSITY &&
        d - bg >= RELIEF_ROAD_CONTRAST &&
        d - local >= RELIEF_ROAD_THINNESS;

      out[i] = isNarrowBrightLine ? Math.min(d, bg + RELIEF_ROAD_HEIGHT_PAD) : d;
    }
    return out;
  }

  function boxBlur(src, dst, width, height, radius) {
    const tmp = new Float32Array(width * height);
    boxBlurHorizontal(src, tmp, width, height, radius);
    boxBlurVertical(tmp, dst, width, height, radius);
  }

  function boxBlurHorizontal(src, dst, width, height, radius) {
    const span = radius * 2 + 1;
    for (let y = 0; y < height; y++) {
      const row = y * width;
      let sum = 0;
      for (let x = -radius; x <= radius; x++) sum += src[row + clamp(x, 0, width - 1)];
      for (let x = 0; x < width; x++) {
        dst[row + x] = sum / span;
        const removeX = clamp(x - radius, 0, width - 1);
        const addX = clamp(x + radius + 1, 0, width - 1);
        sum += src[row + addX] - src[row + removeX];
      }
    }
  }

  function boxBlurVertical(src, dst, width, height, radius) {
    const span = radius * 2 + 1;
    for (let x = 0; x < width; x++) {
      let sum = 0;
      for (let y = -radius; y <= radius; y++) sum += src[clamp(y, 0, height - 1) * width + x];
      for (let y = 0; y < height; y++) {
        dst[y * width + x] = sum / span;
        const removeY = clamp(y - radius, 0, height - 1);
        const addY = clamp(y + radius + 1, 0, height - 1);
        sum += src[addY * width + x] - src[removeY * width + x];
      }
    }
  }

  function buildReliefOverviewBitmap() {
    if (!state.densityBuffer || !state.overviewCanvas) {
      state.reliefCanvas = null;
      return;
    }

    if (!state.reliefCanvas) {
      state.reliefCanvas = document.createElement("canvas");
      state.reliefCanvas.width = OVERVIEW_RES;
      state.reliefCanvas.height = OVERVIEW_RES;
    }

    const rctx = state.reliefCanvas.getContext("2d");
    const imgData = rctx.createImageData(OVERVIEW_RES, OVERVIEW_RES);
    const out = imgData.data;
    const bg = hexToRgb(COLOR_MODES[state.colorMode].bg);
    const density = state.densityBuffer;
    const terrainHeight = buildRoadSuppressedHeightBuffer(density, OVERVIEW_RES, OVERVIEW_RES);

    // Pre-cache 256 possible colors so we do not parse rgb() strings for
    // every single pixel while building the heightfield.
    const colorCache = new Array(256);
    for (let i = 0; i < 256; i++) {
      colorCache[i] = hexToRgbFromColorString(colorForDensity(i / 255, state.colorMode));
    }

    for (let i = 0; i < out.length; i += 4) {
      out[i + 0] = bg.r;
      out[i + 1] = bg.g;
      out[i + 2] = bg.b;
      out[i + 3] = 255;
    }

    function sampleHeight(x, y) {
      x = Math.min(OVERVIEW_RES - 1, Math.max(0, x | 0));
      y = Math.min(OVERVIEW_RES - 1, Math.max(0, y | 0));
      return terrainHeight[y * OVERVIEW_RES + x];
    }

    // Soft cast shadows first.  Terrain drawn later lands on top of these.
    for (let y = 0; y < OVERVIEW_RES; y++) {
      for (let x = 0; x < OVERVIEW_RES; x++) {
        const h = Math.pow(terrainHeight[y * OVERVIEW_RES + x], RELIEF_HEIGHT_POWER);
        if (h <= 0.01) continue;
        const shadowX = x + Math.round(h * (RELIEF_SIDE_SHIFT_PX + 7));
        const shadowY = y + Math.round(h * (RELIEF_HEIGHT_PX * 0.42 + 5));
        blendPixel(out, shadowX, shadowY, { r: 0, g: 0, b: 0 }, h * RELIEF_SHADOW_ALPHA);
        blendPixel(out, shadowX + 1, shadowY, { r: 0, g: 0, b: 0 }, h * RELIEF_SHADOW_ALPHA * 0.55);
        blendPixel(out, shadowX, shadowY + 1, { r: 0, g: 0, b: 0 }, h * RELIEF_SHADOW_ALPHA * 0.45);
      }
    }

    // Draw back-to-front: dark vertical walls first, then lit top pixels.
    for (let y = 0; y < OVERVIEW_RES; y++) {
      for (let x = 0; x < OVERVIEW_RES; x++) {
        const idx = y * OVERVIEW_RES + x;
        const d = density[idx];                  // original map detail/color
        const terrain = terrainHeight[idx];      // original elevation, roads flattened
        const h = Math.pow(terrain, RELIEF_HEIGHT_POWER);
        const lift = Math.round(h * RELIEF_HEIGHT_PX);
        const side = Math.round(h * RELIEF_SIDE_SHIFT_PX);
        const px = x + side;
        const py = y - lift;

        const base = colorCache[Math.max(0, Math.min(255, Math.round(d * 255)))];

        // Slope lighting from upper-left, computed from the road-suppressed
        // height instead of raw brightness. This prevents roads from casting
        // cliff-like shadows while keeping the original detailed relief.
        const gradX = sampleHeight(x + 1, y) - sampleHeight(x - 1, y);
        const gradY = sampleHeight(x, y + 1) - sampleHeight(x, y - 1);
        const shade = clamp(0.88 + (-gradX * 0.55 - gradY * 0.85) * RELIEF_SLOPE_STRENGTH + h * 0.18, 0.42, 1.45);
        const top = scaleRgb(base, shade);
        const wall = scaleRgb(colorCache[Math.max(0, Math.min(255, Math.round(terrain * 255)))], 0.33 + h * 0.28);

        if (lift > 0) {
          const wallBottom = Math.min(OVERVIEW_RES - 1, y + Math.round(side * 0.35));
          for (let wy = py + 1; wy <= wallBottom; wy++) {
            const fade = 1 - clamp((wy - py) / Math.max(1, wallBottom - py + 1), 0, 1) * 0.35;
            plotPixel(out, px, wy, scaleRgb(wall, fade));
          }
        }

        plotPixel(out, px, py, top);
        if (h > 0.5) plotPixel(out, px + 1, py, scaleRgb(top, 0.92));
      }
    }

    rctx.putImageData(imgData, 0, 0);
  }

  function scaleRgb(rgb, amount) {
    return {
      r: Math.max(0, Math.min(255, Math.round(rgb.r * amount))),
      g: Math.max(0, Math.min(255, Math.round(rgb.g * amount))),
      b: Math.max(0, Math.min(255, Math.round(rgb.b * amount)))
    };
  }

  function plotPixel(data, x, y, rgb) {
    x = Math.round(x); y = Math.round(y);
    if (x < 0 || y < 0 || x >= OVERVIEW_RES || y >= OVERVIEW_RES) return;
    const i = (y * OVERVIEW_RES + x) * 4;
    data[i + 0] = rgb.r;
    data[i + 1] = rgb.g;
    data[i + 2] = rgb.b;
    data[i + 3] = 255;
  }

  function blendPixel(data, x, y, rgb, alpha) {
    x = Math.round(x); y = Math.round(y);
    if (x < 0 || y < 0 || x >= OVERVIEW_RES || y >= OVERVIEW_RES) return;
    alpha = clamp(alpha, 0, 1);
    const i = (y * OVERVIEW_RES + x) * 4;
    data[i + 0] = Math.round(data[i + 0] * (1 - alpha) + rgb.r * alpha);
    data[i + 1] = Math.round(data[i + 1] * (1 - alpha) + rgb.g * alpha);
    data[i + 2] = Math.round(data[i + 2] * (1 - alpha) + rgb.b * alpha);
    data[i + 3] = 255;
  }

  function drawMinimap() {
    const minimapSource = (state.reliefEnabled && state.reliefCanvas) ? state.reliefCanvas : state.overviewCanvas;
    if (!minimapSource) return;
    minimapCtx.clearRect(0, 0, MINIMAP_DISPLAY_SIZE, MINIMAP_DISPLAY_SIZE);
    minimapCtx.imageSmoothingEnabled = true;
    minimapCtx.drawImage(minimapSource, 0, 0, MINIMAP_DISPLAY_SIZE, MINIMAP_DISPLAY_SIZE);

    const cellHeight = state.cellWidth * state.aspectRatio;
    const viewCols = canvas.clientWidth / state.cellWidth;
    const viewRows = canvas.clientHeight / cellHeight;

    // Clamp the viewport rectangle to the map itself.  When the full map is
    // visible and centered, this correctly shows a full square instead of a
    // tiny off-edge rectangle.
    const x0 = clamp((state.offsetX / state.cols) * MINIMAP_DISPLAY_SIZE, 0, MINIMAP_DISPLAY_SIZE);
    const y0 = clamp((state.offsetY / state.rows) * MINIMAP_DISPLAY_SIZE, 0, MINIMAP_DISPLAY_SIZE);
    const x1 = clamp(((state.offsetX + viewCols) / state.cols) * MINIMAP_DISPLAY_SIZE, 0, MINIMAP_DISPLAY_SIZE);
    const y1 = clamp(((state.offsetY + viewRows) / state.rows) * MINIMAP_DISPLAY_SIZE, 0, MINIMAP_DISPLAY_SIZE);

    minimapCtx.save();
    minimapCtx.strokeStyle = "#eaf8f6";
    minimapCtx.lineWidth = 2;
    minimapCtx.shadowColor = "rgba(95,242,224,0.65)";
    minimapCtx.shadowBlur = 5;
    minimapCtx.strokeRect(x0 + 1, y0 + 1, Math.max(1, x1 - x0 - 2), Math.max(1, y1 - y0 - 2));
    minimapCtx.restore();
  }

  // ===================================================================
  // Font calibration (text-mode rendering only)
  // ===================================================================

  function calibrateFontForWidth(targetCellWidth) {
    if (Math.abs(state.calibratedForWidth - targetCellWidth) < 0.001) return;
    ctx.font = `${FONT_CALIBRATION_REF_SIZE}px ${cssMonoFontStack()}`;
    const sample = "0".repeat(FONT_CALIBRATION_SAMPLE_LEN);
    const measuredWidth = ctx.measureText(sample).width / FONT_CALIBRATION_SAMPLE_LEN;
    const fontSize = FONT_CALIBRATION_REF_SIZE * (targetCellWidth / measuredWidth);
    state.calibratedFont = `${fontSize.toFixed(2)}px ${cssMonoFontStack()}`;
    state.calibratedForWidth = targetCellWidth;
  }

  function cssMonoFontStack() { return `"Consolas","Cascadia Mono","Courier New",monospace`; }

  // ===================================================================
  // Main render
  // ===================================================================

  function resizeCanvasToDisplaySize() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const targetW = Math.max(1, Math.round(rect.width * dpr));
    const targetH = Math.max(1, Math.round(rect.height * dpr));
    if (canvas.width !== targetW || canvas.height !== targetH) {
      canvas.width = targetW;
      canvas.height = targetH;
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // Exposed on window purely so the test harness can count draw calls per
  // frame without needing a real GPU/timing loop to measure FPS.
  window.__renderStats = { fillTextCalls: 0, drawImageCalls: 0 };

  function renderFrame() {
    state.rafPending = false;
    if (!state.dirty) return;
    state.dirty = false;
    window.__renderStats = { fillTextCalls: 0, drawImageCalls: 0 };

    resizeCanvasToDisplaySize();

    const mode = COLOR_MODES[state.colorMode];
    const cssW = canvas.clientWidth;
    const cssH = canvas.clientHeight;

    ctx.fillStyle = mode.bg;
    ctx.fillRect(0, 0, cssW, cssH);

    if (!state.lines) { updateInfoPanel(); return; }

    const textAlpha = smoothstep(TEXT_FADE_START_PX, TEXT_FADE_END_PX, state.cellWidth);

    // Always draw the relief/overview backdrop first.  Then fade exact ASCII
    // glyphs over it from 1.0x upward, so the map resolves smoothly instead
    // of randomly popping from bitmap into text.
    renderLodBitmap(cssW, cssH);
    if (textAlpha > 0) {
      ctx.save();
      ctx.globalAlpha = textAlpha;
      renderText(cssW, cssH, mode);
      ctx.restore();
    }

    state.lastLodMode = textAlpha <= 0 ? "bitmap" : (textAlpha < 1 ? "transition" : "text");

    drawMinimap();
    updateInfoPanel();
  }

  // Zoomed out far enough that individual glyphs would be sub-pixel noise:
  // draw the whole visible region in a single blit from the precomputed
  // overview bitmap. Cost is O(1) regardless of how far zoomed out we are.
  function renderLodBitmap(cssW, cssH) {
    const lodSource = (state.reliefEnabled && state.reliefCanvas) ? state.reliefCanvas : state.overviewCanvas;
    if (!lodSource) return;

    const cellHeight = state.cellWidth * state.aspectRatio;
    const mapScreenX = -state.offsetX * state.cellWidth;
    const mapScreenY = -state.offsetY * cellHeight;
    const mapScreenW = state.cols * state.cellWidth;
    const mapScreenH = state.rows * cellHeight;

    const destX = Math.max(0, mapScreenX);
    const destY = Math.max(0, mapScreenY);
    const destRight = Math.min(cssW, mapScreenX + mapScreenW);
    const destBottom = Math.min(cssH, mapScreenY + mapScreenH);
    const destW = destRight - destX;
    const destH = destBottom - destY;
    if (destW <= 0 || destH <= 0 || mapScreenW <= 0 || mapScreenH <= 0) return;

    const srcX = ((destX - mapScreenX) / mapScreenW) * OVERVIEW_RES;
    const srcY = ((destY - mapScreenY) / mapScreenH) * OVERVIEW_RES;
    const srcW = (destW / mapScreenW) * OVERVIEW_RES;
    const srcH = (destH / mapScreenH) * OVERVIEW_RES;

    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(lodSource, srcX, srcY, srcW, srcH, destX, destY, destW, destH);
    window.__renderStats.drawImageCalls++;
  }

  function renderText(cssW, cssH, mode) {
    const cellWidth = state.cellWidth;
    const cellHeight = cellWidth * state.aspectRatio;

    const firstCol = clamp(Math.floor(state.offsetX), 0, state.cols - 1);
    const lastCol = clamp(Math.ceil(state.offsetX + cssW / cellWidth), 0, state.cols);
    const firstRow = clamp(Math.floor(state.offsetY), 0, state.rows - 1);
    const lastRow = clamp(Math.ceil(state.offsetY + cssH / cellHeight), 0, state.rows);

    calibrateFontForWidth(cellWidth);
    ctx.font = state.calibratedFont;
    ctx.textBaseline = "top";

    const originPxX = -((state.offsetX - firstCol) * cellWidth);
    const originPxY = -((state.offsetY - firstRow) * cellHeight);

    if (state.colorMode === "heatmap") {
      renderHeatmapRows(firstRow, lastRow, firstCol, lastCol, cellWidth, cellHeight, originPxX, originPxY);
    } else {
      ctx.fillStyle = mode.fg;
      for (let row = firstRow; row < lastRow; row++) {
        const text = state.lines[row].substring(firstCol, lastCol);
        const y = originPxY + (row - firstRow) * cellHeight;
        ctx.fillText(text, originPxX, y);
        window.__renderStats.fillTextCalls++;
      }
    }
  }

  // Heatmap text mode groups consecutive characters by density BUCKET
  // (not by exact character), so long stretches of visually-varied-but-
  // similar-density terrain still collapse into one fillText call per
  // run instead of one per character.
  function renderHeatmapRows(firstRow, lastRow, firstCol, lastCol, cellWidth, cellHeight, originPxX, originPxY) {
    for (let row = firstRow; row < lastRow; row++) {
      const line = state.lines[row];
      const y = originPxY + (row - firstRow) * cellHeight;
      let runStart = firstCol;
      let runBucket = bucketOf(line.charCodeAt(firstCol));
      for (let col = firstCol + 1; col <= lastCol; col++) {
        const b = col < lastCol ? bucketOf(line.charCodeAt(col)) : -1;
        if (b !== runBucket) {
          const runText = line.substring(runStart, col);
          ctx.fillStyle = lerpGradient(COLOR_MODES.heatmap.gradient, runBucket / (HEATMAP_BUCKETS - 1));
          const x = originPxX + (runStart - firstCol) * cellWidth;
          ctx.fillText(runText, x, y);
          window.__renderStats.fillTextCalls++;
          runStart = col;
          runBucket = b;
        }
      }
    }
  }

  function updateInfoPanel() {
    if (!state.lines) { infoPanel.innerHTML = ""; return; }
    const visibleCol = clamp(Math.floor(state.offsetX), 0, Math.max(0, state.cols - 1));
    const visibleRow = clamp(Math.floor(state.offsetY), 0, Math.max(0, state.rows - 1));
    const sizeMb = (state.fileSizeBytes / (1024 * 1024)).toFixed(1);
    const lodLabel = state.lastLodMode === "bitmap" ? "Overview scan" :
      (state.lastLodMode === "transition" ? "Resolving text" : "Detail scan");
    infoPanel.innerHTML =
      `<span class="name">${escapeHtml(state.fileName)}</span>` +
      `Grid <span class="num">${state.cols.toLocaleString()} &times; ${state.rows.toLocaleString()}</span> chars<br>` +
      `Size <span class="num">${sizeMb} MB</span><br>` +
      `Position <span class="num">${visibleCol.toLocaleString()}, ${visibleRow.toLocaleString()}</span><br>` +
      `<span class="lod">${lodLabel}</span>`;
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s;
    return div.innerHTML;
  }

  // ===================================================================
  // View control: zoom / pan / fit
  // ===================================================================

  function fitToScreen() {
    const cssW = canvas.clientWidth || 800;
    const cssH = canvas.clientHeight || 600;
    const fitWidthCell = cssW / state.cols;
    const fitHeightCell = cssH / (state.rows * state.aspectRatio);
    const fitCell = clamp(Math.min(fitWidthCell, fitHeightCell), MIN_CELL_SIZE, MAX_CELL_SIZE);

    setCellWidth(fitCell);

    // Center the fitted map in the viewport.  The old version pinned offset
    // to 0,0, which is why a fully fitted map hugged the left side whenever
    // the viewport was wider than the map's aspect ratio.
    const cellHeight = state.cellWidth * state.aspectRatio;
    const viewCols = cssW / state.cellWidth;
    const viewRows = cssH / cellHeight;
    state.offsetX = (state.cols - viewCols) / 2;
    state.offsetY = (state.rows - viewRows) / 2;

    clampOffsets();
    syncZoomSliderFromCellWidth();
    markDirty();
  }

  function setCellWidth(newWidth) { state.cellWidth = clamp(newWidth, MIN_CELL_SIZE, MAX_CELL_SIZE); }

  function zoomAt(clientX, clientY, factor) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = clientX - rect.left;
    const mouseY = clientY - rect.top;

    const oldCellWidth = state.cellWidth;
    const oldCellHeight = oldCellWidth * state.aspectRatio;

    const charX = state.offsetX + mouseX / oldCellWidth;
    const charY = state.offsetY + mouseY / oldCellHeight;

    setCellWidth(oldCellWidth * factor);
    const newCellHeight = state.cellWidth * state.aspectRatio;

    state.offsetX = charX - mouseX / state.cellWidth;
    state.offsetY = charY - mouseY / newCellHeight;

    clampOffsets();
    syncZoomSliderFromCellWidth();
    markDirty();
  }

  function clampOffsets() {
    if (!state.lines) return;
    const cssW = canvas.clientWidth;
    const cssH = canvas.clientHeight;
    const cellHeight = state.cellWidth * state.aspectRatio;
    const viewCols = cssW / state.cellWidth;
    const viewRows = cssH / cellHeight;

    // If the viewport is larger than the map on an axis, lock that axis to
    // the true centered offset.  If the user is zoomed in, keep a small
    // overscroll margin so panning still feels natural at the edges.
    if (viewCols >= state.cols) {
      state.offsetX = (state.cols - viewCols) / 2;
    } else {
      const marginX = viewCols * 0.15;
      state.offsetX = clamp(state.offsetX, -marginX, state.cols - viewCols + marginX);
    }

    if (viewRows >= state.rows) {
      state.offsetY = (state.rows - viewRows) / 2;
    } else {
      const marginY = viewRows * 0.15;
      state.offsetY = clamp(state.offsetY, -marginY, state.rows - viewRows + marginY);
    }
  }

  function cellWidthFromSlider(sliderValue) {
    const t = sliderValue / ZOOM_SLIDER_STEPS;
    const logMin = Math.log(MIN_CELL_SIZE);
    const logMax = Math.log(MAX_CELL_SIZE);
    return Math.exp(logMin + t * (logMax - logMin));
  }

  function sliderFromCellWidth(cellWidth) {
    const logMin = Math.log(MIN_CELL_SIZE);
    const logMax = Math.log(MAX_CELL_SIZE);
    const t = (Math.log(clamp(cellWidth, MIN_CELL_SIZE, MAX_CELL_SIZE)) - logMin) / (logMax - logMin);
    return Math.round(t * ZOOM_SLIDER_STEPS);
  }

  function syncZoomSliderFromCellWidth() {
    zoomSlider.value = String(sliderFromCellWidth(state.cellWidth));
    zoomVal.textContent = state.cellWidth.toFixed(1) + "x";
  }

  // ===================================================================
  // Event wiring
  // ===================================================================

  btnLoad.addEventListener("click", () => loadDefaultMap());
  btnLoadCenter.addEventListener("click", () => loadDefaultMap());
  fileInput.addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]);
    fileInput.value = "";
  });

  ["dragenter", "dragover"].forEach((evt) => {
    window.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
  });
  window.addEventListener("dragleave", (e) => { e.preventDefault(); dropZone.classList.remove("dragover"); });
  window.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    const files = e.dataTransfer && e.dataTransfer.files;
    if (files && files.length > 0) {
      if (files.length > 1) showBanner(`Loaded "${files[0].name}" (only the first dropped file is used).`, false);
      loadFile(files[0]);
    }
  });

  btnReset.addEventListener("click", () => { if (state.lines) fitToScreen(); });

  btnSettings.addEventListener("click", (e) => {
    e.stopPropagation();
    settingsPopover.classList.toggle("open");
  });
  window.addEventListener("click", (e) => {
    if (!settingsPopover.contains(e.target) && e.target !== btnSettings) {
      settingsPopover.classList.remove("open");
    }
  });

  colorModeSelect.addEventListener("change", () => {
    state.colorMode = colorModeSelect.value;
    recolorOverviewBitmap();
    markDirty();
  });

  aspectSlider.addEventListener("input", () => {
    state.aspectRatio = Number(aspectSlider.value) / 100;
    aspectVal.textContent = aspectSlider.value + "%";
    clampOffsets();
    markDirty();
  });

  reliefToggle.addEventListener("change", () => {
    state.reliefEnabled = reliefToggle.checked;
    if (state.reliefEnabled && !state.reliefCanvas) buildReliefOverviewBitmap();
    markDirty();
  });

  zoomSlider.addEventListener("input", () => {
    if (!state.lines) return;
    const rect = canvas.getBoundingClientRect();
    zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2,
      cellWidthFromSlider(Number(zoomSlider.value)) / state.cellWidth);
  });

  canvas.addEventListener("wheel", (e) => {
    if (!state.lines) return;
    e.preventDefault();
    const factor = Math.pow(1.0015, -e.deltaY);
    zoomAt(e.clientX, e.clientY, factor);
  }, { passive: false });

  canvas.addEventListener("pointerdown", (e) => {
    if (!state.lines) return;
    state.isDragging = true;
    canvas.classList.add("dragging");
    canvas.setPointerCapture(e.pointerId);
    state.dragStartClientX = e.clientX;
    state.dragStartClientY = e.clientY;
    state.dragStartOffsetX = state.offsetX;
    state.dragStartOffsetY = state.offsetY;
  });

  canvas.addEventListener("pointermove", (e) => {
    if (!state.isDragging) return;
    const cellHeight = state.cellWidth * state.aspectRatio;
    const dx = (e.clientX - state.dragStartClientX) / state.cellWidth;
    const dy = (e.clientY - state.dragStartClientY) / cellHeight;
    state.offsetX = state.dragStartOffsetX - dx;
    state.offsetY = state.dragStartOffsetY - dy;
    clampOffsets();
    markDirty();
  });

  function endDrag(e) {
    if (!state.isDragging) return;
    state.isDragging = false;
    canvas.classList.remove("dragging");
    try { canvas.releasePointerCapture(e.pointerId); } catch (err) { /* already released */ }
  }
  canvas.addEventListener("pointerup", endDrag);
  canvas.addEventListener("pointercancel", endDrag);

  minimapCanvas.addEventListener("click", (e) => {
    if (!state.lines) return;
    const rect = minimapCanvas.getBoundingClientRect();
    const fx = (e.clientX - rect.left) / rect.width;
    const fy = (e.clientY - rect.top) / rect.height;
    const cellHeight = state.cellWidth * state.aspectRatio;
    const viewCols = canvas.clientWidth / state.cellWidth;
    const viewRows = canvas.clientHeight / cellHeight;
    state.offsetX = fx * state.cols - viewCols / 2;
    state.offsetY = fy * state.rows - viewRows / 2;
    clampOffsets();
    markDirty();
  });

  window.addEventListener("keydown", (e) => {
    if (!state.lines) return;
    const panStep = 3;
    switch (e.key) {
      case "ArrowLeft": state.offsetX -= panStep; break;
      case "ArrowRight": state.offsetX += panStep; break;
      case "ArrowUp": state.offsetY -= panStep; break;
      case "ArrowDown": state.offsetY += panStep; break;
      case "+": case "=": zoomAt(
        canvas.getBoundingClientRect().left + canvas.clientWidth / 2,
        canvas.getBoundingClientRect().top + canvas.clientHeight / 2, 1.2); return;
      case "-": case "_": zoomAt(
        canvas.getBoundingClientRect().left + canvas.clientWidth / 2,
        canvas.getBoundingClientRect().top + canvas.clientHeight / 2, 1 / 1.2); return;
      case "0": fitToScreen(); return;
      default: return;
    }
    clampOffsets();
    markDirty();
  });

  window.addEventListener("resize", () => { clampOffsets(); markDirty(); });
  if (window.ResizeObserver) new ResizeObserver(() => { clampOffsets(); markDirty(); }).observe(canvas.parentElement);

  reliefToggle.checked = state.reliefEnabled;
  resizeCanvasToDisplaySize();
  markDirty();
  loadDefaultMap();
})();
</script>
</body>
</html>
